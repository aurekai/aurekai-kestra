id: aurekai_hf_model_memory_publish
namespace: aurekai.release

description: Validate model-memory artifacts before publishing to Hugging Face.

inputs:
  - id: aurekai_version
    type: STRING
    defaults: "0.8.0-alpha.4"
  - id: akai_package_version
    type: STRING
    defaults: "0.8.0-alpha.4"
  - id: aurekai_manifest_schema
    type: STRING
    defaults: "aurekai.deploy.v1"
  - id: helm_chart_version
    type: STRING
    defaults: "0.8.1"
  - id: artifact_dir
    type: STRING
    defaults: dist

tasks:
  - id: inspect_artifacts
    type: io.kestra.plugin.scripts.shell.Commands
    commands:
      - find {{ inputs.artifact_dir }} -type f \( -name '*.akmodel' -o -name '*.aksae' -o -name '*.akfpqx' \) | sort
