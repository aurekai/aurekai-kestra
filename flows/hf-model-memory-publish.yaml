id: aurekai_hf_model_memory_publish
namespace: aurekai.release

description: Validate model-memory artifacts before publishing to Hugging Face.

inputs:
  - id: artifact_dir
    type: STRING
    defaults: dist

tasks:
  - id: inspect_artifacts
    type: io.kestra.plugin.scripts.shell.Commands
    commands:
      - find {{ inputs.artifact_dir }} -type f \( -name '*.akmodel' -o -name '*.aksae' -o -name '*.akfpqx' \) | sort
