id: aurekai_pypi_release_check
namespace: aurekai.release

description: Check PyPI release availability for a target version.

inputs:
  - id: aurekai_version
    type: STRING
    defaults: "0.8.0-alpha.4"
  - id: akai_package_version
    type: STRING
    defaults: "0.8.0-alpha.4"
  - id: aurekai_manifest_schema
    type: STRING
    defaults: "aurekai.deploy.v1"
  - id: helm_chart_version
    type: STRING
    defaults: "0.8.1"
  - id: version
    type: STRING
    defaults: 0.8.0a3

tasks:
  - id: check_pypi
    type: io.kestra.plugin.scripts.shell.Commands
    commands:
      - curl -fsSL https://pypi.org/pypi/aurekai/{{ inputs.version }}/json >/dev/null
