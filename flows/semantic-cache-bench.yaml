id: aurekai_semantic_cache_bench
namespace: aurekai.bench

description: Run semantic cache benchmark and emit JSON metrics.

inputs:
  - id: aurekai_version
    type: STRING
    defaults: "0.8.0-alpha.4"
  - id: akai_package_version
    type: STRING
    defaults: "0.8.0-alpha.4"
  - id: aurekai_manifest_schema
    type: STRING
    defaults: "aurekai.deploy.v1"
  - id: helm_chart_version
    type: STRING
    defaults: "0.8.1"
  - id: recipe
    type: STRING
    defaults: bench.recipe.json

tasks:
  - id: run_cache_benchmark
    type: io.kestra.plugin.scripts.shell.Commands
    commands:
      - akai run {{ inputs.recipe }} --semantic-cache
